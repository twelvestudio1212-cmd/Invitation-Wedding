<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan Hera & Ahmad</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* FRAME UTAMA UNTUK VIDEO ANDA */
        .video-container {
            width: 100%;
            max-width: 500px; /* Ukuran pas untuk layar HP */
            background: #000;
            line-height: 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative;
        }

        video {
            width: 100%;
            height: auto;
        }

        /* TOMBOL NAVIGASI DI BAWAH VIDEO */
        .action-buttons {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-sizing: border-box;
            background: white;
            text-align: center;
        }

        .btn {
            display: block;
            background: #1a2a6c;
            color: white;
            padding: 15px;
            margin: 10px 0;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            border: none;
            cursor: pointer;
        }

        .bank-info {
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            text-align: left;
        }

        .copy-hint {
            font-size: 11px;
            color: #888;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video controls autoplay loop muted>
            <source src="The Wedding of Hera & Ahmad-3.mp4" type="video/mp4">
            Maaf, browser Anda tidak mendukung tag video.
        </video>
    </div>

    <div class="action-buttons">
        <p><strong>01 April 2026</strong><br>Subang, Jawa Barat</p>
        
        <a href="https://maps.google.com" target="_blank" class="btn">LIHAT LOKASI ACARA</a>
        
        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
        
        <h3>Kado Digital</h3>
        
        <div class="bank-info">
            <strong>Bank Muamalat</strong><br>
            <span id="rek1">1170012747</span><br>
            a.n Herawati
            <button onclick="copy('rek1')" style="float:right; font-size:11px;">Salin</button>
        </div>

        <div class="bank-info">
            <strong>DANA</strong><br>
            <span id="rek2">08131545691</span><br>
            a.n Ahmad Hidayat
            <button onclick="copy('rek2')" style="float:right; font-size:11px;">Salin</button>
        </div>
    </div>

    <script>
        function copy(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text);
            alert("Nomor berhasil disalin!");
        }
    </script>

</body>
</html>
